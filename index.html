<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>Instrumen Asesmen Awal Murid Baru — MPLS Ramah 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --green-950:#06140e; --green-900:#0a2018; --green-800:#0e2c20; --green-700:#13402e;
  --green-600:#1a5238; --green-500:#1f6b48; --green-400:#2c8a5e;
  --lime:#7be8a6; --emerald:#34d399; --gold:#E7B53C; --gold-2:#f6cf6b;
  --bg:#08160f; --bg-2:#0c2118;
  --card:rgba(255,255,255,0.055); --card-2:rgba(255,255,255,0.035);
  --text:#eaf4ee; --muted:#9fb6a8; --border:rgba(255,255,255,0.10); --border-2:rgba(123,232,166,0.30);
  --danger:#ff8a7a; --danger-bg:rgba(255,138,122,0.14);
  --success:#5fe3a1; --success-bg:rgba(95,227,161,0.14);
  --radius:22px; --radius-sm:14px;
  --shadow-sm:0 3px 14px rgba(0,0,0,.30);
  --shadow:0 16px 44px rgba(0,0,0,.40);
  --shadow-lg:0 26px 64px rgba(0,0,0,.50);
  --font:'Plus Jakarta Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;}
::selection{background:rgba(123,232,166,.30);color:#fff;}
body{margin:0;color:var(--text);font-family:var(--font);position:relative;overflow-x:hidden;
  background:
    radial-gradient(1100px 600px at 8% -10%, rgba(46,138,94,.45), transparent 55%),
    radial-gradient(1000px 700px at 105% 5%, rgba(231,181,60,.18), transparent 50%),
    radial-gradient(900px 700px at 50% 120%, rgba(28,107,72,.40), transparent 50%),
    linear-gradient(180deg,var(--bg) 0%,var(--bg-2) 100%);
  background-attachment:fixed;}
body:before, body:after{content:"";position:fixed;border-radius:50%;filter:blur(70px);z-index:0;pointer-events:none;opacity:.5;}
body:before{width:360px;height:360px;left:-110px;top:-90px;background:radial-gradient(circle,rgba(52,211,153,.55),transparent 70%);}
body:after{width:320px;height:320px;right:-90px;top:32%;background:radial-gradient(circle,rgba(231,181,60,.28),transparent 70%);}
.app{max-width:620px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;position:relative;z-index:1;}

header{background:linear-gradient(135deg,var(--green-700) 0%, var(--green-950) 100%);color:#fff;
  padding:20px 22px 18px;position:sticky;top:0;z-index:20;box-shadow:var(--shadow-lg);}
header:after{content:"";position:absolute;left:0;right:0;bottom:0;height:3px;
  background:linear-gradient(90deg,var(--emerald),var(--lime),var(--gold));box-shadow:0 0 12px rgba(123,232,166,.6);}
header .toprow{display:flex;justify-content:space-between;align-items:center;gap:10px;}
header h1{font-size:16.5px;margin:0;font-weight:800;letter-spacing:.2px;line-height:1.3;}
header .sub{font-size:11.5px;color:#bfe6d2;margin-top:3px;}
.timer{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.16);
  border-radius:20px;padding:7px 14px;font-size:13px;font-weight:800;white-space:nowrap;letter-spacing:.5px;
  backdrop-filter:blur(4px);box-shadow:inset 0 0 0 1px rgba(123,232,166,.15);}
.timer.warn{background:linear-gradient(135deg,#ff7a6b,#e0533f);border-color:transparent;color:#fff;animation:pulse 1.2s infinite;box-shadow:0 8px 22px rgba(224,83,63,.45);}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.55;}}
.progress-wrap{margin-top:13px;background:rgba(255,255,255,.14);border-radius:8px;height:8px;overflow:hidden;box-shadow:inset 0 1px 3px rgba(0,0,0,.35);}
.progress-bar{height:100%;background:linear-gradient(90deg,var(--emerald),var(--lime) 55%,var(--gold));border-radius:8px;
  transition:width .5s cubic-bezier(.4,0,.2,1);box-shadow:0 0 12px rgba(123,232,166,.7);}
.steplabel{font-size:11px;color:#cdeede;margin-top:8px;font-weight:600;letter-spacing:.3px;}

main{flex:1;padding:22px 18px 120px;}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:22px;margin-bottom:18px;
  box-shadow:var(--shadow);animation:fadeIn .4s ease;position:relative;overflow:hidden;
  backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);}
.card:before{content:"";position:absolute;top:0;left:0;right:0;height:4px;
  background:linear-gradient(90deg,var(--green-400),var(--emerald),var(--gold));}
.card h2{font-size:19px;margin:0 0 4px;color:#fff;font-weight:800;letter-spacing:.2px;}
.card .eyebrow{font-size:11px;font-weight:800;letter-spacing:.08em;color:var(--lime);text-transform:uppercase;margin-bottom:6px;
  display:inline-block;background:rgba(123,232,166,.14);padding:4px 12px;border-radius:20px;border:1px solid rgba(123,232,166,.25);}
.card .tujuan{font-size:13px;color:var(--muted);font-style:italic;margin:8px 0 18px;line-height:1.55;}
.field{margin-bottom:18px;}
.field label{display:block;font-size:13.5px;font-weight:700;margin-bottom:8px;color:#dcefe4;}
.field input[type=text], .field textarea{
  width:100%;border:1.6px solid var(--border);border-radius:var(--radius-sm);padding:14px 15px;font-size:15.5px;
  font-family:inherit;background:rgba(255,255,255,.06);color:var(--text);transition:border-color .18s, box-shadow .18s, background .18s;
  box-shadow:inset 0 1px 4px rgba(0,0,0,.25);}
.field textarea{min-height:76px;resize:vertical;line-height:1.55;}
.field input::placeholder, .field textarea::placeholder{color:#6f8678;}
.field input:focus, .field textarea:focus{outline:none;border-color:var(--emerald);
  box-shadow:0 0 0 4px rgba(52,211,153,.18),inset 0 1px 4px rgba(0,0,0,.25);background:rgba(255,255,255,.10);}
.hint{font-size:11.5px;color:var(--muted);margin-top:6px;}

.passage{background:linear-gradient(135deg,rgba(123,232,166,.16),rgba(255,255,255,.04));border:1px solid rgba(123,232,166,.28);
  border-radius:var(--radius-sm);padding:18px 20px;font-size:14px;line-height:1.8;margin-bottom:20px;color:#dff5e8;
  box-shadow:inset 0 0 0 1px rgba(255,255,255,.04);}
.passage strong{display:block;margin-bottom:9px;color:var(--lime);font-size:15px;font-weight:800;}

.likert-item{border-bottom:1px solid rgba(255,255,255,.08);padding:18px 0;}
.likert-item:last-child{border-bottom:none;}
.likert-aspek{font-size:10.5px;font-weight:800;color:var(--lime);text-transform:uppercase;letter-spacing:.06em;
  background:rgba(123,232,166,.12);display:inline-block;padding:3px 9px;border-radius:7px;margin-bottom:7px;border:1px solid rgba(123,232,166,.22);}
.likert-text{font-size:14.5px;margin-bottom:13px;line-height:1.5;font-weight:500;color:#e3f1e9;}
.likert-scale{display:flex;gap:9px;}
.likert-opt{flex:1;text-align:center;border:1.6px solid var(--border);border-radius:14px;padding:12px 4px;cursor:pointer;
  font-size:13px;font-weight:800;color:var(--muted);background:rgba(255,255,255,.04);transition:all .2s cubic-bezier(.4,0,.2,1);user-select:none;
  position:relative;overflow:hidden;}
.likert-opt:hover{border-color:var(--emerald);color:var(--lime);transform:translateY(-2px);box-shadow:0 8px 18px rgba(0,0,0,.30);}
.likert-opt.selected{background:linear-gradient(135deg,var(--green-500),var(--green-700));border-color:transparent;color:#fff;
  box-shadow:0 8px 22px rgba(28,107,72,.55),0 0 0 2px rgba(123,232,166,.35);transform:translateY(-1px);}
.likert-opt.selected:after{content:"\2713";position:absolute;top:5px;right:7px;font-size:11px;opacity:.9;color:var(--lime);}
.likert-legend{display:flex;justify-content:space-between;font-size:10.5px;color:var(--muted);margin:11px 0 2px;padding:0 2px;font-weight:600;}

.riasec-cat{margin-bottom:20px;background:var(--card-2);border:1px solid var(--border);
  border-radius:var(--radius-sm);padding:16px 18px;box-shadow:var(--shadow-sm);}
.riasec-cat h3{font-size:15px;color:var(--lime);margin:0 0 2px;font-weight:800;}
.riasec-cat .desc{font-size:11.5px;color:var(--muted);margin-bottom:10px;}
.check-item{display:flex;align-items:flex-start;gap:12px;padding:11px 0;border-bottom:1px solid rgba(255,255,255,.07);}
.check-item:last-child{border-bottom:none;}
.check-item input{margin-top:3px;width:21px;height:21px;flex-shrink:0;accent-color:var(--emerald);cursor:pointer;}
.check-item label{font-size:14px;line-height:1.5;cursor:pointer;color:#e3f1e9;}

.navbar{position:fixed;bottom:0;left:0;right:0;background:rgba(10,32,24,.82);border-top:1px solid var(--border);
  padding:14px 18px calc(14px + env(safe-area-inset-bottom));display:flex;gap:12px;max-width:620px;margin:0 auto;
  box-shadow:0 -8px 30px rgba(0,0,0,.45);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);z-index:30;}
button{border:none;border-radius:var(--radius-sm);padding:15px;font-size:15.5px;font-weight:800;cursor:pointer;flex:1;
  transition:all .2s cubic-bezier(.4,0,.2,1);position:relative;overflow:hidden;}
.btn-primary{background:linear-gradient(135deg,var(--green-500),var(--green-700));color:#fff;box-shadow:0 8px 20px rgba(28,107,72,.45);}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 12px 26px rgba(52,211,153,.45);}
.btn-primary:active{transform:translateY(0);}
.btn-primary:disabled{opacity:.55;cursor:default;transform:none;}
.btn-secondary{background:rgba(255,255,255,.08);color:var(--text);box-shadow:var(--shadow-sm);border:1px solid var(--border);}
.btn-secondary:hover{background:rgba(255,255,255,.14);}
.btn-secondary:disabled{opacity:.4;cursor:default;}
.btn-gold{background:linear-gradient(135deg,var(--gold),var(--gold-2));color:#3a2c08;box-shadow:0 8px 20px rgba(231,181,60,.40);}

.welcome{text-align:center;padding:26px 6px;animation:fadeIn .45s ease;}
.welcome .badge{display:inline-block;background:rgba(123,232,166,.14);color:var(--lime);font-size:12px;font-weight:800;
  padding:7px 16px;border-radius:20px;margin-bottom:18px;letter-spacing:.5px;border:1px solid rgba(123,232,166,.25);}
.welcome h1{font-size:25px;color:#fff;margin:0 0 12px;font-weight:800;}
.welcome p{font-size:14.5px;color:var(--muted);line-height:1.75;margin-bottom:18px;}
.welcome ul{text-align:left;font-size:14px;line-height:1.8;color:var(--text);background:var(--card);border-radius:var(--radius);
  padding:18px 18px 18px 34px;border:1px solid var(--border);margin-bottom:20px;box-shadow:var(--shadow);}

.hero{background:linear-gradient(135deg,var(--green-700) 0%, var(--green-950) 100%);color:#fff;border-radius:var(--radius);
  padding:30px 24px;margin-bottom:18px;box-shadow:var(--shadow-lg);position:relative;overflow:hidden;border:1px solid rgba(123,232,166,.18);}
.hero:before{content:"";position:absolute;left:-60px;bottom:-60px;width:200px;height:200px;border-radius:50%;
  background:radial-gradient(circle,rgba(46,138,94,.55),transparent 70%);}
.hero:after{content:"";position:absolute;right:-40px;top:-40px;width:170px;height:170px;border-radius:50%;
  background:radial-gradient(circle,rgba(231,181,60,.40),transparent 70%);}
.hero .badge{display:inline-block;background:rgba(123,232,166,.20);color:var(--lime);font-size:11.5px;font-weight:800;
  padding:6px 15px;border-radius:20px;margin-bottom:14px;letter-spacing:.5px;position:relative;border:1px solid rgba(123,232,166,.3);}
.hero h1{font-size:23px;margin:0 0 10px;font-weight:800;position:relative;line-height:1.25;}
.hero p{font-size:14px;color:#cdeede;line-height:1.75;margin:0;position:relative;}

.review-row{display:flex;justify-content:space-between;align-items:center;padding:14px 14px;border-bottom:1px solid rgba(255,255,255,.08);
  font-size:14px;border-radius:10px;transition:background .15s;}
.review-row:hover{background:rgba(255,255,255,.04);}
.review-row:last-of-type{border-bottom:none;}
.review-row .rname{color:var(--muted);font-weight:600;}
.review-row .rstat{font-weight:800;color:#fff;padding:5px 13px;border-radius:20px;font-size:12.5px;background:rgba(255,255,255,.08);}
.review-ok{background:var(--success-bg)!important;color:var(--success)!important;}
.review-warn{background:var(--danger-bg)!important;color:var(--danger)!important;}

.done-wrap{text-align:center;padding:24px 6px;animation:fadeIn .5s ease;}
.done-wrap .icon{font-size:54px;margin-bottom:10px;filter:drop-shadow(0 6px 14px rgba(52,211,153,.35));}
.done-wrap h1{color:#fff;font-size:23px;margin:0 0 8px;font-weight:800;}
.done-wrap p{color:var(--muted);font-size:14px;line-height:1.75;}
.result-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:20px;text-align:left;
  margin-top:20px;box-shadow:var(--shadow);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);}
.result-card h3{font-size:13.5px;color:var(--lime);margin:18px 0 12px;font-weight:800;letter-spacing:.2px;}
.result-card h3:first-child{margin-top:0;}
.bar-row{margin-bottom:12px;}
.bar-row .lbl{display:flex;justify-content:space-between;font-size:12.5px;margin-bottom:5px;font-weight:600;color:#dcefe4;}
.bar-track{background:rgba(255,255,255,.08);border-radius:8px;height:10px;overflow:hidden;box-shadow:inset 0 1px 3px rgba(0,0,0,.35);}
.bar-fill{background:linear-gradient(90deg,var(--green-400),var(--emerald));height:100%;border-radius:8px;
  transition:width .7s cubic-bezier(.4,0,.2,1);box-shadow:0 0 10px rgba(52,211,153,.5);}
.numkey{font-size:12.5px;color:var(--muted);padding:7px 0;border-bottom:1px solid rgba(255,255,255,.07);}
.numkey:last-child{border-bottom:none;}
.numkey b{color:var(--success);}

.banner{border-radius:var(--radius-sm);padding:14px 17px;font-size:12.5px;margin-bottom:18px;line-height:1.6;font-weight:500;}
.banner.info{background:rgba(123,232,166,.12);color:#bfe6d2;border:1px solid rgba(123,232,166,.25);}
.banner.error{background:var(--danger-bg);color:var(--danger);border:1px solid rgba(255,138,122,.30);}
.banner.success{background:var(--success-bg);color:var(--success);border:1px solid rgba(95,227,161,.30);}

@keyframes fadeIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
@media (prefers-reduced-motion: reduce){*{animation:none!important;transition:none!important;}}
</style>
</head>

<script>
/* ============ KONFIGURASI ============ */

const DURASI_MENIT = 90;
const STORAGE_KEY = "mpls_instrumen_v1";

/* ============ DATA INSTRUMEN ============ */
const SEL_ITEMS = [
  {aspek:"Kesadaran Diri", text:"Saya bisa mengenali apa yang saya rasakan (senang, sedih, cemas, marah)."},
  {aspek:"Kesadaran Diri", text:"Saya tahu kelebihan dan hal yang perlu saya perbaiki pada diri saya."},

];
const SEL_LIKERT = ["1 · Tidak Sesuai","2 · Kurang Sesuai","3 · Sesuai","4 · Sangat Sesuai"];

const LITERACY_PASSAGES = [
  {
    title:"Perpustakaan yang Berubah",
    text:"Dahulu, perpustakaan sekolah hanya dikenal sebagai tempat menyimpan buku pelajaran yang sepi pengunjung. Namun, di banyak sekolah sekarang, perpustakaan mulai berubah menjadi ruang yang lebih hidup. Selain rak buku, tersedia sudut baca yang nyaman, komputer untuk mengakses bahan belajar daring, dan jadwal kegiatan seperti diskusi buku atau lomba menulis cerpen. Perubahan ini didorong oleh kesadaran bahwa minat membaca murid akan tumbuh jika suasana membaca menyenangkan, bukan sekadar kewajiban. Beberapa sekolah bahkan melibatkan murid dalam memilih buku baru yang akan dibeli setiap tahun. Dengan cara ini, murid merasa perpustakaan adalah milik mereka, bukan sekadar fasilitas yang harus dijaga jaraknya.",
    questions:[
      {level:"Literal", text:"Apa saja fasilitas baru yang disebutkan dalam teks selain rak buku?"},
      {level:"Literal", text:"Apa yang dilakukan beberapa sekolah agar murid merasa memiliki perpustakaan?"},
      {level:"Inferensial", text:"Menurutmu, mengapa suasana yang menyenangkan dianggap penting untuk menumbuhkan minat membaca?"},
      {level:"Inferensial", text:"Apa kemungkinan dampak jika murid dilibatkan dalam memilih buku baru?"},
      {level:"Evaluatif/Reflektif", text:"Jika kamu bisa mengusulkan satu perubahan untuk perpustakaan sekolahmu, apa yang akan kamu usulkan dan mengapa?"}

  },
  {

    questions:[
      {level:"Literal", text:"Apa saja sanggar atau kegiatan yang disebutkan dalam teks festival seni tersebut?"},
      {level:"Literal", text:"Apa tujuan utama diadakannya Festival Seni menurut teks?"},
      {level:"Inferensial", text:"Mengapa mencampur murid dari kelas berbeda dalam satu kelompok dianggap bermanfaat?"},
      {level:"Evaluatif/Reflektif", text:"Jika kamu diminta menambah satu sanggar dalam festival, sanggar apa yang akan kamu usulkan dan mengapa?"}

    text:"Tim kebersihan sekolah memulai program memilah sampah sejak semester lalu. Setiap kelas diberi dua wadah: satu untuk sampah kering seperti kertas dan plastik, dan satu lagi untuk sampah basah seperti sisa makanan. Sampah basah diolah menjadi kompos untuk menyuburkan tanaman di kebun sekolah, sedangkan sampah kering didaur ulang atau dijual untuk menambah kas kegiatan siswa. Hasilnya, halaman sekolah terlihat lebih bersih dan murid belajar bahwa sampah sebenarnya masih memiliki nilai jika dikelola dengan benar.",
    questions:[
      {level:"Literal", text:"Jenis sampah apa saja yang dipisahkan dalam program di teks tersebut?"},

const ALL_LITERACY_Q = [];
LITERACY_PASSAGES.forEach(p=> p.questions.forEach(q=> ALL_LITERACY_Q.push({level:q.level, text:q.text, passage:p.title})));

/* ============ FUNGSI GLOBAL UTAMA ============ */
function riasecFlatIndex(catIdx, itemIdx){
  let base = 0;
  for(let i=0;i<catIdx;i++) base += RIASEC[i].items.length;
  return base + itemIdx;
}

/* ============ STATE HANDLING ============ */
let state;
function loadState(){
  try{
    const s = localStorage.getItem(STORAGE_KEY);
    if(s) return JSON.parse(s);
  }catch(e){}
  return null;
}

function saveState(){
  try{
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  }catch(e){}
}

function resetState(){
  try{ localStorage.removeItem(STORAGE_KEY); }catch(e){}
  initState();
  render();
}

function initState(){
  state = {
    stepIndex: 0,
    startTime: null,
    meta: {nama:"", kelas:"", sekolah:""},
    sel: {scores:new Array(SEL_ITEMS.length).fill(null), refleksi1:"", refleksi2:""},
    literasi: new Array(ALL_LITERACY_Q.length).fill(""),
    numerasi: new Array(NUMERACY_QUESTIONS.length).fill(""),
    riasec: new Array(RIASEC.reduce((a,c)=>a+c.items.length,0)).fill(false),
    submitted:false
  };
}

// Inisialisasi awal objek state secara aman
const saved = loadState();
if(saved && typeof saved === 'object' && saved.stepIndex !== undefined){
  state = saved;
} else {
  initState();
}

const STEPS = ["identitas","sel","literasi","numerasi","riasec","review","done"];
const STEP_LABELS = {identitas:"Identitas", sel:"A. Sosial-Emosional", literasi:"B. Literasi", numerasi:"C. Numerasi", riasec:"D. Bakat & Minat", review:"Tinjau & Kirim"};

/* ============ TIMER ============ */
let timerInterval = null;
function startTimerIfNeeded(){
  if(!state.startTime){ state.startTime = Date.now(); saveState(); }
  if(timerInterval) clearInterval(timerInterval);
  timerInterval = setInterval(updateTimerDisplay, 1000);
  updateTimerDisplay();
}
function remainingSeconds(){
  if(!state.startTime) return DURASI_MENIT*60;
  const elapsed = Math.floor((Date.now()-state.startTime)/1000);
  return DURASI_MENIT*60 - elapsed;
}
function updateTimerDisplay(){
  const elBox = document.getElementById("timerBox");
  if(!elBox) return;
  const rem = remainingSeconds();
  const abs = Math.max(0, rem);
  const m = String(Math.floor(abs/60)).padStart(2,"0");
  const s = String(abs%60).padStart(2,"0");
  elBox.textContent = (rem<0?"Waktu habis":(m+":"+s));
  elBox.classList.toggle("warn", rem<=300);
}

/* ============ DOM HELPERS ============ */
function el(tag, attrs, children){
  const e = document.createElement(tag);
  if(attrs) for(const k in attrs){
    if(k==="class") e.className = attrs[k];
    else if(k==="html") e.innerHTML = attrs[k];
    else e.setAttribute(k, attrs[k]);
  }
  (children||[]).forEach(c=>{ if(c) e.appendChild(c); });
  return e;
}
function text(tag, cls, str){ 
  const e = document.createElement(tag); 
  if(cls) e.className=cls; 
  e.textContent = str; 
  return e; 
}

function goStep(delta){
  let newIdx = state.stepIndex + delta;
  newIdx = Math.max(0, Math.min(STEPS.length-1, newIdx));
  state.stepIndex = newIdx;
  saveState();
  window.scrollTo(0,0);
  render();
}
function currentStepName(){ return STEPS[state.stepIndex]; }

/* ============ RENDER HIERARCHY ============ */
function render(){
  const app = document.getElementById("app");
  if(!app) return;
  app.innerHTML = "";
  const stepName = currentStepName();

  if(stepName==="done"){ app.appendChild(renderDone()); return; }

  app.appendChild(renderHeader(stepName));
  const main = el("main", {}, []);
  if(stepName==="identitas") main.appendChild(renderIdentitas());
  if(stepName==="sel") main.appendChild(renderSEL());
  if(stepName==="literasi") main.appendChild(renderLiterasi());
  if(stepName==="numerasi") main.appendChild(renderNumerasi());
  if(stepName==="riasec") main.appendChild(renderRiasec());
  if(stepName==="review") main.appendChild(renderReview());
  app.appendChild(main);
  app.appendChild(renderNav(stepName));
  startTimerIfNeeded();
}

/* ============ INTERFACE BUILDER ============ */
function renderHeader(stepName){
  const total = STEPS.length-1;
  const posMap = {identitas:1, sel:2, literasi:3, numerasi:4, riasec:5, review:6};
  const pos = posMap[stepName]||1;
  const header = el("header",{},[]);
  const top = el("div",{class:"toprow"},[]);
  const titleWrap = el("div",{},[]);
  titleWrap.appendChild(text("h1","","MPLS Ramah 2026"));
  titleWrap.appendChild(text("div","sub","Instrumen Asesmen Awal Murid Baru"));
  top.appendChild(titleWrap);
  top.appendChild(el("div",{class:"timer",id:"timerBox"},[]));
  header.appendChild(top);
  const pw = el("div",{class:"progress-wrap"},[]);
  pw.appendChild(el("div",{class:"progress-bar", style:`width:${(pos/total*100).toFixed(0)}%`},[]));
  header.appendChild(pw);
  header.appendChild(text("div","steplabel", `Langkah ${pos} dari ${total} — ${STEP_LABELS[stepName]}`));
  return header;
}

function renderNav(stepName){
  const nav = el("nav",{class:"navbar"},[]);
  const back = el("button",{class:"btn-secondary"},[]); back.textContent="Kembali";
  back.disabled = state.stepIndex<=0;
  back.onclick = ()=>goStep(-1);
  nav.appendChild(back);
  
  if(stepName==="review"){
    const send = el("button",{class:"btn-primary"},[]); send.textContent="Kirim Jawaban";
    send.onclick = submitAll;
    nav.appendChild(send);
  } else {
    const next = el("button",{class:"btn-primary"},[]); next.textContent="Lanjut";
    next.onclick = ()=>{ if(validateStep(stepName)) goStep(1); };
    nav.appendChild(next);
  }
  return nav;
}

function validateStep(stepName){
  if(stepName==="identitas"){
    if(!state.meta.nama.trim() || !state.meta.kelas.trim() || !state.meta.sekolah.trim()){
      alert("Mohon lengkapi Nama, Kelas, dan Asal Sekolah terlebih dahulu.");
      return false;
    }
  }
  return true;
}

/* ============ ENGINE KALKULASI & SKORING ============ */
function computeSelAspek(){
  const sums = {};
  SEL_ITEMS.forEach((item, idx)=>{
    sums[item.aspek] = sums[item.aspek]||0;
    sums[item.aspek] += (state.sel.scores[idx]||0);
  });
  return sums;
}
function computeRiasecCounts(){
  const counts = {};
  RIASEC.forEach((cat, ci)=>{
    let n=0;
    cat.items.forEach((_,ii)=>{ if(state.riasec[riasecFlatIndex(ci,ii)]) n++; });
    counts[cat.code] = n;
  });
  return counts;
}
function computeRiasecTop(counts){
  const max = Math.max(...Object.values(counts));
  if(max===0) return [];
  return Object.keys(counts).filter(k=>counts[k]===max);
}
function normalizeNum(str){
  if(!str) return null;
  let s = String(str).trim().replace(/rp/i,"").replace(/\s/g,"");
  if(s.indexOf(",")!==-1){
    s = s.replace(/\./g,"").replace(",", ".");
  } else if(/^\d{1,3}(\.\d{3})+$/.test(s)){
    s = s.replace(/\./g,"");
  }
  const m = s.match(/-?\d+(\.\d+)?/);
  return m ? parseFloat(m[0]) : null;
}
function computeNumeracyScore(){
  let correct = 0;
  NUMERACY_QUESTIONS.forEach((q, idx)=>{
    const given = normalizeNum(state.numerasi[idx]);
    const key = parseFloat(q.key);
    if(given!==null && Math.abs(given-key) < 0.01) correct++;
  });
  return correct;
}

/* ============ LOGIK PENGIRIMAN DATA ============ */
function buildPayload(){
  const selAspek = computeSelAspek();
  const riasecCounts = computeRiasecCounts();
  const riasecTop = computeRiasecTop(riasecCounts);
  const elapsedMin = state.startTime ? Math.round((Date.now()-state.startTime)/60000) : null;

  const payload = {
    timestamp: new Date().toISOString(),
    nama: state.meta.nama, kelas: state.meta.kelas, sekolah: state.meta.sekolah,
    waktu_pengerjaan_menit: elapsedMin,
    sel_kesadaran_diri: selAspek["Kesadaran Diri"]||0,
    sel_pengelolaan_diri: selAspek["Pengelolaan Diri"]||0,
    sel_kesadaran_sosial: selAspek["Kesadaran Sosial"]||0,
    sel_keterampilan_relasi: selAspek["Keterampilan Relasi"]||0,
    sel_pengambilan_keputusan: selAspek["Pengambilan Keputusan"]||0,
    sel_refleksi1: state.sel.refleksi1, sel_refleksi2: state.sel.refleksi2,
    sel_raw_json: JSON.stringify(state.sel.scores),
    numerasi_skor: computeNumeracyScore(),
    riasec_r: riasecCounts.R||0, riasec_i: riasecCounts.I||0, riasec_a: riasecCounts.A||0,
    riasec_s: riasecCounts.S||0, riasec_e: riasecCounts.E||0, riasec_c: riasecCounts.C||0,
    riasec_top: riasecTop.join(", ")
  };
  ALL_LITERACY_Q.forEach((_,i)=>{ payload["literasi_q"+(i+1)] = state.literasi[i]||""; });
  NUMERACY_QUESTIONS.forEach((_,i)=>{ payload["numerasi_q"+(i+1)] = state.numerasi[i]||""; });
  return payload;
}

function submitAll(){
  const payload = buildPayload();
  window._lastPayload = payload;
  const sendBtn = document.querySelector(".navbar .btn-primary");
  if(sendBtn){ sendBtn.textContent = "Mengirim..."; sendBtn.disabled = true; }

  if(!SCRIPT_URL || SCRIPT_URL.includes("GANTI_DENGAN")){
    finishSubmit(payload, false);
    return;
  }

  fetch(SCRIPT_URL, {
    method: "POST",
    mode: "no-cors",
    headers: {"Content-Type": "application/x-www-form-urlencoded"},
    body: new URLSearchParams({ "json": JSON.stringify(payload) })
  })
  .then(() => {
    finishSubmit(payload, true);
  })
  .catch(()=>{
    finishSubmit(payload, false);
  });
}

function finishSubmit(payload, sentOk){
  state.submitted = true;
  state.stepIndex = STEPS.indexOf("done");
  state.lastSendStatus = sentOk;
  saveState();
  render();
}

/* ============ DYNAMIC LOCAL PDF GENERATOR ============ */
function pdfEscape(s){
  s = String(s)
    .replace(/[—–]/g,"-").replace(/•/g,"-").replace(/★/g,"*")
    .replace(/[✓✔]/g,"v").replace(/[‘’]/g,"'").replace(/[“”]/g,'"')
    .replace(/é/g,"e").replace(/í/g,"i").replace(/ó/g,"o").replace(/ú/g,"u").replace(/ñ/g,"n");
  let out="";
  for(let i=0;i<s.length;i++){ let c=s.charCodeAt(i); if(c>255) c=63; out+=String.fromCharCode(c); }
  return out.replace(/\\/g,"\\\\").replace(/\(/g,"\\(").replace(/\)/g,"\\)");
}

function buildPDF(lines){
  const pageH=842, pageW=595, mx=50, top=pageH-mx, bottom=mx;
  let pages=[], cur=[], y=top;
  lines.forEach(l=>{
    const h = l.size*1.6;
    if(y-h < bottom){ pages.push(cur); cur=[]; y=top; }
    cur.push({t:l.text, f:l.font||"F1", s:l.size, y:y-h+l.size*0.32});
    y-=h;
  });
  if(cur.length) pages.push(cur);

  const objs=[]; let nextId=5;
  const pageIds=[], contentIds=[];
  for(let i=0;i<pages.length;i++){ pageIds.push(nextId++); contentIds.push(nextId++); }
  objs[1]=`<< /Type /Catalog /Pages 2 0 R >>`;
  objs[2]=`<< /Type /Pages /Kids [${pageIds.map(p=>p+" 0 R").join(" ")}] /Count ${pages.length} >>`;
  objs[3]=`<< /Type /Font /Subtype /Type1 /BaseFont /Helvetica /Encoding /WinAnsiEncoding >>`;
  objs[4]=`<< /Type /Font /Subtype /Type1 /BaseFont /Helvetica-Bold /Encoding /WinAnsiEncoding >>`;
  for(let i=0;i<pages.length;i++){
    const pid=pageIds[i], cid=contentIds[i];
    let stream="BT\n";
    pages[i].forEach(ln=>{ stream+=`/${ln.f} ${ln.s} Tf
1 0 0 1 ${mx} ${ln.y} Tm
(${pdfEscape(ln.t)}) Tj
`; });
    stream+="ET";
    objs[pid]=`<< /Type /Page /Parent 2 0 R /MediaBox [0 0 ${pageW} ${pageH}] /Resources << /Font << /F1 3 0 R /F2 4 0 R >> >> /Contents ${cid} 0 R >>`;
    objs[cid]=`<< /Length ${stream.length} >>
stream
${stream}
endstream`;
  }

  let pdf="%PDF-1.4\n"; const offsets=[];
  for(let i=1;i<objs.length;i++){ if(objs[i]==null) continue; offsets[i]=pdf.length; pdf+=`${i} 0 obj
${objs[i]}
endobj
`; }
  const xrefStart=pdf.length;
  let xref=`xref
0 ${objs.length}
0000000000 65535 f 
`;
  for(let i=1;i<objs.length;i++){ const off=offsets[i]!=null?offsets[i]:0; xref+=String(off).padStart(10,"0")+" 00000 n \n"; }
  pdf+=xref+`trailer
<< /Size ${objs.length} /Root 1 0 R >>
startxref
${xrefStart}
%%EOF`;

  const bytes=new Uint8Array(pdf.length);
  for(let i=0;i<pdf.length;i++) bytes[i]=pdf.charCodeAt(i);
  return bytes;
}

function downloadResultPDF(){
  const payload = window._lastPayload || buildPayload();
  const selAspek = computeSelAspek();
  const riasecCounts = computeRiasecCounts();
  const top = computeRiasecTop(riasecCounts);
  const elapsed = payload.waktu_pengerjaan_menit!=null ? payload.waktu_pengerjaan_menit+" menit" : "-";
  const L=[];
  L.push({text:"HASIL UJI INSTRUMEN MPLS RAMAH 2026", size:17, font:"F2"});
  L.push({text:"Ringkasan Asesmen Awal Murid Baru", size:11});
  L.push({text:"" , size:6});
  L.push({text:"IDENTITAS PESERTA", size:13, font:"F2"});
  L.push({text:"Nama    : "+payload.nama, size:11});
  L.push({text:"Kelas   : "+payload.kelas, size:11});
  L.push({text:"Sekolah : "+payload.sekolah, size:11});
  L.push({text:"Waktu   : "+elapsed, size:11});
  L.push({text:"" , size:8});
  L.push({text:"RINGKASAN SOSIAL-EMOSIONAL", size:13, font:"F2"});
  Object.keys(selAspek).forEach(k=>{ L.push({text:"- "+k+" : "+selAspek[k]+" / 12", size:11}); });
  L.push({text:"" , size:8});
  L.push({text:"KECENDERUNGAN BAKAT & MINAT (RIASEC)", size:13, font:"F2"});
  RIASEC.forEach(cat=>{
    const n=riasecCounts[cat.code]||0;
    const star=top.includes(cat.code)?" *":"";
    L.push({text:"- "+cat.code+" "+cat.nama+star+" : "+n+" / "+cat.items.length, size:11});
  });
  L.push({text:"" , size:8});
  L.push({text:"KUNCI JAWABAN NUMERASI", size:13, font:"F2"});
  NUMERACY_QUESTIONS.forEach((q,idx)=>{
    const given=state.numerasi[idx]||"(kosong)";
    const isCorrect = normalizeNum(state.numerasi[idx])!==null && Math.abs(normalizeNum(state.numerasi[idx])-parseFloat(q.key))<0.01;
    L.push({text:`Soal ${idx+1} (${q.title}): jawaban "${given}" | kunci ${q.key} ${q.unit}${isCorrect?" [BENAR]":""}`, size:10});
  });
  L.push({text:"" , size:8});
  L.push({text:"Dokumen ini dihasilkan secara otomatis dari aplikasi asesmen MPLS.", size:9});

  const bytes=buildPDF(L);
  const blob=new Blob([bytes],{type:"application/pdf"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="Hasil_Instrumen_MPLS_"+(payload.nama||"peserta").replace(/\s+/g,"_")+".pdf";
  a.click();
}

/* ============ STEP: DONE (HALAMAN AKHIR) ============ */
function renderDone(){
  const payload = window._lastPayload || buildPayload();
  const w = el("div",{class:"done-wrap"},[]);
  w.appendChild(text("div","icon", state.lastSendStatus===false ? "⚠️" : "✅"));
  w.appendChild(text("h1","", state.lastSendStatus===false ? "Jawaban Tersimpan, Perlu Dikirim Ulang" : "Terima Kasih!"));
  if(state.lastSendStatus!==false){
    const okBanner = el("div",{class:"banner success", style:"margin-top:14px;"},[]);
    okBanner.textContent = "✅ Berhasil terkirim: jawaban atas nama \""+(payload.nama||"-")+"\" dari "+(payload.sekolah||"-")+" telah masuk ke spreadsheet guru pada "+new Date().toLocaleString("id-ID")+".";
    w.appendChild(okBanner);
  }
  w.appendChild(text("p","", state.lastSendStatus===false
    ? "Jawabanmu sudah tersimpan di perangkat ini, tetapi belum berhasil terkirim ke server (periksa koneksi internet). Silakan unduh cadangan di bawah dan hubungi gurumu."
    : "Jawabanmu telah berhasil dikirim ke guru. Sekolah ini akan menjadi rumah keduamu — selamat memulai perjalanan barumu!"));

  const rc = el("div",{class:"result-card"},[]);
  rc.appendChild(el("h3",{},[document.createTextNode("Ringkasan Sosial-Emosional")]));
  const selAspek = computeSelAspek();
  Object.keys(selAspek).forEach(k=>{
    const pct = Math.round((selAspek[k]/12)*100);
    const row = el("div",{class:"bar-row"},[]);
    const lbl = el("div",{class:"lbl"},[]);
    lbl.appendChild(document.createTextNode(k));
    lbl.appendChild(document.createTextNode(selAspek[k]+"/12"));
    row.appendChild(lbl);
    const track = el("div",{class:"bar-track"},[]);
    track.appendChild(el("div",{class:"bar-fill", style:"width:"+pct+"%"},[]));
    row.appendChild(track);
    rc.appendChild(row);
  });

  rc.appendChild(el("h3",{},[document.createTextNode("Kecenderungan Bakat & Minat (RIASEC)")]));
  const riasecCounts = computeRiasecCounts();
  const top = computeRiasecTop(riasecCounts);
  RIASEC.forEach(cat=>{
    const n = riasecCounts[cat.code]||0;
    const pct = Math.round((n/cat.items.length)*100);
    const row = el("div",{class:"bar-row"},[]);
    const lbl = el("div",{class:"lbl"},[]);
    lbl.appendChild(document.createTextNode(cat.code+" "+cat.nama+(top.includes(cat.code)?" ★":"")));
    lbl.appendChild(document.createTextNode(n+"/"+cat.items.length));
    row.appendChild(lbl);
    const track = el("div",{class:"bar-track"},[]);
    track.appendChild(el("div",{class:"bar-fill", style:"width:"+pct+"%"},[]));
    row.appendChild(track);
    rc.appendChild(row);
  });

  rc.appendChild(el("h3",{},[document.createTextNode("Kunci Jawaban Numerasi (untuk belajar)")]));
  const keyToggle = el("button",{class:"btn-secondary", type:"button", style:"width:100%;padding:12px;margin-bottom:10px;border-radius:10px;"},[]);
  keyToggle.textContent = "Tampilkan Kunci Jawaban ▼";
  const keyBox = el("div",{style:"display:none;"},[]);
  NUMERACY_QUESTIONS.forEach((q,idx)=>{
    const given = state.numerasi[idx]||"(kosong)";
    const isCorrect = normalizeNum(state.numerasi[idx])!==null && Math.abs(normalizeNum(state.numerasi[idx])-parseFloat(q.key))<0.01;
    const row = el("div",{class:"numkey"},[]);
    row.innerHTML = `Soal ${idx+1}: jawabanmu <b>${given}</b> — kunci: <b>${q.key} ${q.unit}</b> ${isCorrect?"✓":""}`;
    keyBox.appendChild(row);
  });
  keyToggle.onclick = ()=>{
    const hidden = keyBox.style.display === "none";
    keyBox.style.display = hidden ? "block" : "none";
    keyToggle.textContent = hidden ? "Sembunyikan Kunci Jawaban ▲" : "Tampilkan Kunci Jawaban ▼";
  };
  rc.appendChild(keyToggle);
  rc.appendChild(keyBox);

  w.appendChild(rc);

  if(state.lastSendStatus===false){
    const resend = el("button",{class:"btn-primary", style:"width:100%;padding:15px;margin-top:16px;border-radius:12px;"},[]);
    resend.textContent = "Kirim Ulang ke Guru";
    resend.onclick = ()=>{ submitAll(); };
    w.appendChild(resend);
  }

  const dl = el("button",{class:"btn-gold", style:"width:100%;padding:14px;margin-top:16px;border-radius:12px;"},[]);
  dl.textContent = "Unduh PDF Hasil Uji Instrumen";
  dl.onclick = ()=>{ downloadResultPDF(); };
  w.appendChild(dl);

  const again = el("button",{class:"btn-secondary", style:"width:100%;padding:14px;margin-top:10px;border-radius:12px;"},[]);
  again.textContent = "Isi untuk Murid Lain (Reset Formulir)";
  again.onclick = ()=>{ if(confirm("Formulir akan dikosongkan untuk pengisian baru. Lanjutkan?")) resetState(); };
  w.appendChild(again);

  return w;
}

/* ============ INITIALIZATION RUNNER ============ */
document.addEventListener("DOMContentLoaded", function(){
  render();
});

// Cadangan pengeksekusian jika DOMContentLoaded sudah lewat
if (document.readyState === "complete" || document.readyState === "interactive") {
  render();
}
</script>
